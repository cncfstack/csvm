name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: |
        git clone -b v1.38.1 https://github.com/kubernetes/minikube.git minikube
        cd minikube/deploy/kicbase
        # not build auto-pause, and not need
        sed -i '/auto-pause/d' Dockerfile
        docker login  --username=${{ secrets.HARBOR_PUSH_USERNAME }} --password=${{ secrets.HARBOR_PUSH_PASSWORD }} harbor.cncfstack.com
        docker buildx create --name mybuilder --use
        docker buildx build --platform linux/amd64,linux/arm64  --build-arg KICBASE_IMAGE=node:22.21.1-bookworm-slim  --push . --file Dockerfile --tag harbor.cncfstack.com/cncfstack/csvm:dev
